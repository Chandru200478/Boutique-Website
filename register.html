<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Vastrika</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
<div class="wrap">
<a href="index.html" class="brand">
Vastrika
<small>Sarees & Weaves</small>
</a>
</div>
</header>

<section class="hero">

<div class="wrap">

<div class="hero-eyebrow">
Join Vastrika
</div>

<h1>
Create Your Account
</h1>

<p>
Become part of our saree-loving community.
</p>

</div>

</section>

<section>

<div class="wrap">

<form class="auth-form">

<input type="text"
placeholder="Full Name"
required>

<input type="email"
placeholder="Email Address"
required>

<input type="tel"
placeholder="Phone Number">

<input type="password"
placeholder="Password"
required>

<input type="password"
placeholder="Confirm Password"
required>

<button type="submit"
class="btn btn-solid">
Create Account
</button>

</form>

</div>

</section>

<footer class="site-footer">
<div class="wrap">
<p>© 2026 Vastrika Sarees</p>
</div>
</footer>

</body>
</html>
