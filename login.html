<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Vastrika</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
<div class="wrap">
<a href="index.html" class="brand">
Vastrika
<small>Sarees & Weaves</small>
</a>
</div>
</header>

<section class="hero">

<div class="wrap">

<div class="hero-eyebrow">
Welcome Back
</div>

Login To Your Account
</h1>

<p>
Access your wishlist, saved sarees and orders.
</p>

</div>

</section>

Don't have an account?

</div>

</section>

<footer class="site-footer">
<div class="wrap">
<p>© 2026 Vastrika Sarees</p>
</div>
